<!DOCTYPE html>
<html>
<head>
  <title>init only extension example</title>
</head>
<body>
<script>
const jsPsych = initJsPsych({
  extensions: [
    {type: jsPsychTestExtension}
  ]
});

const block = {
  type: jsPsychTestPlugin,
  stimulus: "Hello"
};

jsPsych.run([block]);
</script>
</body>
</html>
