<!DOCTYPE html>
<html>
<head>
  <!-- jspsych-autodoc:title complex sentinel example -->
</head>
<body>
<script>
var jsPsych = initJsPsych();

var dummyVar = "this should not appear";

// jspsych-autodoc:start
var fixationTrial = jsPsychTestTimeline.createFixationTrial("+");
// jspsych-autodoc:end

console.log("this should not appear either");

// jspsych-autodoc:start
var stimulusTrial = jsPsychTestTimeline.createStimulusTrial(
    "hello",
    12,
    true
)
// jspsych-autodoc:end

var anotherDummy = 42;

// jspsych-autodoc:start
var feedbackTrial = jsPsychTestTimeline.createFeedbackTrial(false);
// jspsych-autodoc:end

jsPsych.run([fixationTrial, stimulusTrial, feedbackTrial]);
</script>
</body>
</html>
