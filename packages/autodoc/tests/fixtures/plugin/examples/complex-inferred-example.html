<!DOCTYPE html>
<html>
<head>
  <title>complex inferred example</title>
</head>
<body>
<script>
var jsPsych = initJsPsych();

var stimulus = "Hello, world!";
var duration = 1000;
var choices = ["f", "j"];

var trial = {
  type: jsPsychTestPlugin,
  stimulus: stimulus,
  trial_duration: duration,
  choices: choices
};

jsPsych.run([trial]);
</script>
</body>
</html>
